<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>CHRONOMETER — 정밀 시각/타이머</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=IBM+Plex+Sans+KR:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0A0E0D;
    --panel: #101513;
    --panel-line: #1C2622;
    --grid: #152019;
    --phosphor: #4AE290;
    --phosphor-dim: #2C7A54;
    --amber: #FFB000;
    --amber-dim: #7A5600;
    --text-muted: #6E8079;
    --text-soft: #A8BDB4;
    --danger: #FF5D5D;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }

  html,body{
    background: var(--bg);
    color: var(--text-soft);
    font-family: 'IBM Plex Sans KR', sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing:antialiased;
  }

  body{
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 28px 28px;
    padding: 28px 16px 60px;
  }

  .wrap{
    max-width: 860px;
    margin: 0 auto;
  }

  /* ---------- header ---------- */
  header{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    flex-wrap:wrap;
    gap:12px;
    border-bottom: 1px solid var(--panel-line);
    padding-bottom: 14px;
    margin-bottom: 20px;
  }

  .brand{
    font-family:'JetBrains Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.28em;
    color: var(--phosphor);
    text-transform: uppercase;
  }
  .brand span{ color: var(--text-muted); letter-spacing: 0.1em; }

  .clock-precision{
    font-family:'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.05em;
    text-align:right;
  }
  .clock-precision b{ color: var(--phosphor); font-weight:600; }

  /* ---------- world clock strip ---------- */
  .strip{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 1px;
    background: var(--panel-line);
    border: 1px solid var(--panel-line);
    margin-bottom: 26px;
  }
  .strip-cell{
    background: var(--panel);
    padding: 12px 14px;
  }
  .strip-city{
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-muted);
    display:flex;
    justify-content:space-between;
  }
  .strip-offset{ color: var(--phosphor-dim); }
  .strip-time{
    font-family:'JetBrains Mono', monospace;
    font-variant-numeric: tabular-nums;
    font-size: 20px;
    font-weight: 500;
    color: var(--text-soft);
    margin-top: 4px;
  }
  .strip-date{
    font-family:'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 2px;
  }
  .strip-cell.primary .strip-time{ color: var(--phosphor); }
  .strip-cell.primary{ box-shadow: inset 0 0 0 1px var(--phosphor-dim); }

  /* ---------- stopwatch panel ---------- */
  .panel{
    background: var(--panel);
    border: 1px solid var(--panel-line);
    padding: 40px 24px 28px;
    position: relative;
    margin-bottom: 26px;
  }
  .panel::before{
    content: "STOPWATCH";
    position:absolute;
    top:14px; left:24px;
    font-family:'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.24em;
    color: var(--text-muted);
  }
  .panel-status{
    position:absolute;
    top:14px; right:24px;
    font-family:'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.14em;
    color: var(--text-muted);
  }
  .panel-status.running{ color: var(--phosphor); }
  .panel-status .dot{
    display:inline-block; width:6px; height:6px; border-radius:50%;
    background: var(--text-muted); margin-right:6px; vertical-align:1px;
  }
  .panel-status.running .dot{ background: var(--phosphor); box-shadow:0 0 6px var(--phosphor); }

  .display{
    text-align:center;
    font-family:'JetBrains Mono', monospace;
    font-variant-numeric: tabular-nums;
    line-height:1;
    margin: 18px 0 30px;
  }
  .display .main{
    font-size: clamp(48px, 11vw, 88px);
    font-weight: 700;
    color: var(--phosphor);
    text-shadow: 0 0 18px rgba(74,226,144,0.25);
  }
  .display .ms{
    font-size: clamp(28px, 6vw, 46px);
    font-weight: 500;
    color: var(--phosphor-dim);
  }

  .controls{
    display:flex;
    justify-content:center;
    gap: 12px;
    flex-wrap: wrap;
  }
  button{
    font-family:'JetBrains Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 13px 26px;
    background: transparent;
    border: 1px solid var(--panel-line);
    color: var(--text-soft);
    cursor: pointer;
    transition: all .15s ease;
  }
  button:hover{ border-color: var(--phosphor-dim); color: var(--phosphor); }
  button:active{ transform: translateY(1px); }
  button:focus-visible{ outline: 2px solid var(--phosphor); outline-offset: 2px; }

  #startStop{ border-color: var(--phosphor-dim); color: var(--phosphor); min-width:120px; }
  #startStop:hover{ background: rgba(74,226,144,0.08); }
  #startStop.running{ border-color: var(--danger); color: var(--danger); }
  #startStop.running:hover{ background: rgba(255,93,93,0.08); }

  #lapBtn:disabled, #resetBtn:disabled{ opacity:0.35; cursor:not-allowed; }
  #lapBtn:disabled:hover, #resetBtn:disabled:hover{ border-color: var(--panel-line); color: var(--text-soft); }

  /* ---------- lap tape ---------- */
  .tape-wrap{
    background: var(--panel);
    border: 1px solid var(--panel-line);
    padding: 0;
  }
  .tape-header{
    display:flex;
    justify-content:space-between;
    padding: 12px 20px;
    border-bottom: 1px solid var(--panel-line);
    font-family:'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--text-muted);
    text-transform: uppercase;
  }
  .tape{
    max-height: 260px;
    overflow-y: auto;
  }
  .tape-row{
    display:grid;
    grid-template-columns: 44px 1fr 1fr;
    gap: 10px;
    padding: 10px 20px;
    border-bottom: 1px dashed var(--panel-line);
    font-family:'JetBrains Mono', monospace;
    font-size: 13px;
    font-variant-numeric: tabular-nums;
    animation: printIn .25s ease;
  }
  .tape-row:last-child{ border-bottom:none; }
  .tape-row .idx{ color: var(--amber); font-weight:700; }
  .tape-row .split{ color: var(--text-soft); }
  .tape-row .cum{ color: var(--text-muted); text-align:right; }
  .tape-row.best .split{ color: var(--phosphor); }
  .tape-row.worst .split{ color: var(--danger); }

  .tape-empty{
    padding: 24px 20px;
    font-family:'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
    text-align:center;
  }

  @keyframes printIn{
    from{ opacity:0; transform: translateY(-4px); }
    to{ opacity:1; transform: translateY(0); }
  }

  ::-webkit-scrollbar{ width:8px; }
  ::-webkit-scrollbar-track{ background: var(--panel); }
  ::-webkit-scrollbar-thumb{ background: var(--panel-line); }

  footer{
    text-align:center;
    margin-top: 22px;
    font-family:'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.08em;
  }

  @media (prefers-reduced-motion: reduce){
    .tape-row{ animation:none; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="brand">CHRONOMETER <span>/ 정밀 시각·시간 측정</span></div>
    <div class="clock-precision">TIMING SOURCE: <b>performance.now()</b><br>display resolution: <b id="resLabel">—</b></div>
  </header>

  <div class="strip" id="worldClockStrip"></div>

  <div class="panel">
    <div class="panel-status" id="statusLabel"><span class="dot"></span>STOPPED</div>
    <div class="display">
      <span class="main" id="mainTime">00:00:00</span><span class="ms" id="msTime">.000</span>
    </div>
    <div class="controls">
      <button id="startStop">시작</button>
      <button id="lapBtn" disabled>LAP</button>
      <button id="resetBtn" disabled>RESET</button>
    </div>
  </div>

  <div class="tape-wrap">
    <div class="tape-header">
      <span>LAP TAPE</span>
      <span id="lapCount">0 laps</span>
    </div>
    <div class="tape" id="tape">
      <div class="tape-empty" id="tapeEmpty">시작 후 LAP을 누르면 기록이 여기에 출력됩니다</div>
    </div>
  </div>

  <footer>requestAnimationFrame 기반 · setInterval 드리프트 없음 · 시스템 시계 동기화</footer>
</div>

<script>
  // ---------------- World clock ----------------
  const zones = [
    { city: 'SEOUL', tz: 'Asia/Seoul', primary: true },
    { city: 'UTC',   tz: 'UTC' },
    { city: 'LONDON',tz: 'Europe/London' },
    { city: 'NEW YORK', tz: 'America/New_York' },
    { city: 'TOKYO', tz: 'Asia/Tokyo' },
  ];

  const stripEl = document.getElementById('worldClockStrip');
  const cellEls = zones.map(z => {
    const cell = document.createElement('div');
    cell.className = 'strip-cell' + (z.primary ? ' primary' : '');
    cell.innerHTML = `
      <div class="strip-city"><span>${z.city}</span><span class="strip-offset" data-offset></span></div>
      <div class="strip-time" data-time>--:--:--</div>
      <div class="strip-date" data-date>----</div>
    `;
    stripEl.appendChild(cell);
    return cell;
  });

  function offsetLabel(tz){
    const now = new Date();
    const dtf = new Intl.DateTimeFormat('en-US', { timeZone: tz, timeZoneName: 'shortOffset' });
    const part = dtf.formatToParts(now).find(p => p.type === 'timeZoneName');
    return part ? part.value.replace('GMT','UTC') : '';
  }

  function updateWorldClocks(now){
    zones.forEach((z, i) => {
      const cell = cellEls[i];
      const timeStr = new Intl.DateTimeFormat('en-GB', {
        timeZone: z.tz, hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
      }).format(now);
      const dateStr = new Intl.DateTimeFormat('en-GB', {
        timeZone: z.tz, weekday: 'short', day: '2-digit', month: 'short'
      }).format(now);
      cell.querySelector('[data-time]').textContent = timeStr;
      cell.querySelector('[data-date]').textContent = dateStr;
      cell.querySelector('[data-offset]').textContent = offsetLabel(z.tz);
    });
  }

  // ---------------- Precision estimate ----------------
  (function estimateResolution(){
    const samples = [];
    let last = performance.now();
    let count = 0;
    function tick(){
      const now = performance.now();
      if (now !== last) { samples.push(now - last); last = now; count++; }
      if (count < 12) requestAnimationFrame(tick);
      else {
        const min = Math.min(...samples).toFixed(3);
        document.getElementById('resLabel').textContent = '~' + min + ' ms/frame';
      }
    }
    requestAnimationFrame(tick);
  })();

  // ---------------- Stopwatch ----------------
  let running = false;
  let startPerf = 0;      // performance.now() at last start
  let accumulated = 0;    // ms accumulated across previous runs
  let laps = [];          // { cum: ms, split: ms }

  const mainTimeEl = document.getElementById('mainTime');
  const msTimeEl = document.getElementById('msTime');
  const startStopBtn = document.getElementById('startStop');
  const lapBtn = document.getElementById('lapBtn');
  const resetBtn = document.getElementById('resetBtn');
  const statusLabel = document.getElementById('statusLabel');
  const tapeEl = document.getElementById('tape');
  const tapeEmptyEl = document.getElementById('tapeEmpty');
  const lapCountEl = document.getElementById('lapCount');

  function elapsedMs(){
    if (!running) return accumulated;
    return accumulated + (performance.now() - startPerf);
  }

  function formatTime(ms){
    const totalMs = Math.max(0, ms);
    const h = Math.floor(totalMs / 3600000);
    const m = Math.floor((totalMs % 3600000) / 60000);
    const s = Math.floor((totalMs % 60000) / 1000);
    const msec = Math.floor(totalMs % 1000);
    const pad = (n, len=2) => String(n).padStart(len, '0');
    return {
      main: `${pad(h)}:${pad(m)}:${pad(s)}`,
      ms: '.' + pad(msec, 3)
    };
  }

  function renderDisplay(){
    const t = formatTime(elapsedMs());
    mainTimeEl.textContent = t.main;
    msTimeEl.textContent = t.ms;
  }

  function renderTape(){
    if (laps.length === 0){
      tapeEl.innerHTML = '';
      tapeEl.appendChild(tapeEmptyEl);
      lapCountEl.textContent = '0 laps';
      return;
    }
    lapCountEl.textContent = laps.length + (laps.length === 1 ? ' lap' : ' laps');
    const splits = laps.map(l => l.split);
    const best = Math.min(...splits);
    const worst = Math.max(...splits);
    tapeEl.innerHTML = laps.map((l, i) => {
      const cls = splits.length > 1 ? (l.split === best ? 'best' : l.split === worst ? 'worst' : '') : '';
      const cumT = formatTime(l.cum);
      const splitT = formatTime(l.split);
      return `<div class="tape-row ${cls}">
                <div class="idx">${String(i+1).padStart(2,'0')}</div>
                <div class="split">${splitT.main}${splitT.ms}</div>
                <div class="cum">${cumT.main}${cumT.ms}</div>
              </div>`;
    }).reverse().join('');
  }

  function loop(){
    updateWorldClocks(new Date());
    renderDisplay();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

  startStopBtn.addEventListener('click', () => {
    if (!running){
      running = true;
      startPerf = performance.now();
      startStopBtn.textContent = '정지';
      startStopBtn.classList.add('running');
      statusLabel.innerHTML = '<span class="dot"></span>RUNNING';
      statusLabel.classList.add('running');
      lapBtn.disabled = false;
      resetBtn.disabled = false;
    } else {
      running = false;
      accumulated += performance.now() - startPerf;
      startStopBtn.textContent = '시작';
      startStopBtn.classList.remove('running');
      statusLabel.innerHTML = '<span class="dot"></span>STOPPED';
      statusLabel.classList.remove('running');
    }
  });

  lapBtn.addEventListener('click', () => {
    if (!running) return;
    const cum = elapsedMs();
    const prevCum = laps.length ? laps[laps.length-1].cum : 0;
    laps.push({ cum, split: cum - prevCum });
    renderTape();
  });

  resetBtn.addEventListener('click', () => {
    running = false;
    accumulated = 0;
    laps = [];
    startStopBtn.textContent = '시작';
    startStopBtn.classList.remove('running');
    statusLabel.innerHTML = '<span class="dot"></span>STOPPED';
    statusLabel.classList.remove('running');
    lapBtn.disabled = true;
    resetBtn.disabled = true;
    renderDisplay();
    renderTape();
  });

  renderTape();
</script>
</body>
</html>
